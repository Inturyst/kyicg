<!DOCTYPE html>
<html>
<head>
  <title>KCG</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .text {
      font-size: 36px;
      letter-spacing: 2px;
      font-weight: 500;
    }

    .sub {
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="text">
    <span>KYI</span>
    <span class="sub"> is coming.</span>
  </div>
</body>
</html>
