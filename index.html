<!DOCTYPE html>
<html>
<head>
  <title>KYI</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      text-align: center;
    }

    .main {
      font-size: 64px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .sub {
      font-size: 24px;
      opacity: 0;
      margin-top: 10px;
      letter-spacing: 2px;
      animation: fadeIn 2s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main">KYI</div>
    <div class="sub">is coming.</div>
  </div>
</body>
</html>
